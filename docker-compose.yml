 services:
  cadotour:
    image: docker.promogi.fr/romain.jamet/cadotour:1a085d93
    restart: always

  proxy:
    image: docker.promogi.fr/neogi/infra/nginx-proxy:latest
    restart: always
    ports:
      - 443:443
    environment:
      NGINX_SERVER_NAME: cadotour.promogi.fr
      NGINX_PROXY: http://cadotour:80
