<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CadoCreator</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ======= TOP BAR ======= -->
<header id="topbar">
  <span id="app-title">CadoCreator</span>
  <div id="topbar-actions">
    <a href="cadotour.html" class="btn-secondary" style="text-decoration:none">▶ CadoTour</a>
    <button id="btn-load-site" class="btn-secondary">Charger un site</button>
    <button id="btn-save-site" class="btn-secondary" disabled>Sauvegarder</button>
    <button id="btn-export-site" class="btn-secondary" disabled>Exporter JSON</button>
  </div>
</header>

<!-- ======= MAIN LAYOUT ======= -->
<div id="main-layout">

  <!-- LEFT SIDEBAR -->
  <aside id="sidebar">
    <div id="site-header">
      <span id="site-header-icon"></span>
      <span id="site-header-name">Aucun site sélectionné</span>
      <button id="btn-deselect-site" class="btn-icon btn-sm hidden" title="Désélectionner le site">✕</button>
      <button id="btn-site-options" class="btn-icon btn-sm hidden" title="Options du site">⚙</button>
    </div>
    <nav id="sidebar-nav">
      <!-- populated by renderSidebar() -->
    </nav>
  </aside>

  <!-- CENTER: map or plan -->
  <main id="center-panel">

    <!-- Search bar overlay (only on map) -->
    <div id="map-search">
      <input id="map-search-input" type="text"
        placeholder="🔍 Rechercher une adresse en France..."
        autocomplete="off" spellcheck="false" />
      <div id="map-search-results" class="hidden"></div>
    </div>

    <!-- Step banner (perimeter draw / access arrow placement) -->
    <div id="step-banner" class="hidden">
      <span id="step-banner-text"></span>
      <div id="step-banner-actions"></div>
    </div>

    <!-- Leaflet map -->
    <div id="map-container">
      <div id="map"></div>
    </div>

    <!-- Plan viewer (building floor or site plan) -->
    <div id="plan-container" class="hidden">
      <div id="plan-toolbar">
        <span id="plan-floor-name">Plan</span>
        <button id="btn-upload-plan" class="btn-secondary btn-sm">Changer le plan</button>
        <input id="input-upload-plan" type="file" accept="image/*" class="hidden" />
      </div>
      <div id="plan-viewport">
        <canvas id="plan-canvas"></canvas>
        <svg id="plan-overlay"></svg>
      </div>
    </div>

    <!-- Map context menu (right-click) -->
    <div id="map-context-menu" class="hidden"></div>

  </main>

  <!-- RIGHT PANEL: photo viewer -->
  <aside id="viewer-panel" class="hidden">
    <div id="viewer-header">
      <span id="viewer-title">Photo</span>
      <button id="btn-close-viewer" class="btn-icon">✕</button>
    </div>
    <div id="viewer-media-wrap">
      <div id="classic-viewer" class="hidden">
        <img id="classic-photo-img" src="" alt="Photo" />
        <div id="classic-photo-caption"></div>
      </div>
      <div id="panorama-viewer" class="hidden">
        <div id="pannellum-container"></div>
      </div>
      <button id="btn-viewer-fullscreen" class="viewer-overlay-btn viewer-fs-btn" title="Plein écran">⛶</button>
      <button id="btn-viewer-prev" class="viewer-overlay-btn viewer-nav-prev hidden" title="Précédent">‹</button>
      <button id="btn-viewer-next" class="viewer-overlay-btn viewer-nav-next hidden" title="Suivant">›</button>
      <div id="viewer-gallery-count" class="viewer-gallery-count hidden"></div>
    </div>
    <div id="photo-editor">
      <div class="editor-row">
        <label>Titre</label>
        <input id="edit-photo-title" type="text" class="input-field" placeholder="Titre de la photo" />
      </div>
      <div class="editor-row">
        <label>Description</label>
        <textarea id="edit-photo-desc" class="input-field" rows="3" placeholder="Description..."></textarea>
      </div>
      <div id="bearing-row" class="editor-row hidden">
        <label>Orientation</label>
        <div class="bearing-wrap">
          <input id="edit-photo-bearing" type="number" min="0" max="360" step="1" class="input-field" placeholder="0–360°" />
          <span class="bearing-unit">°</span>
          <button id="btn-clear-bearing" class="btn-icon btn-sm" title="Réinitialiser à 0">↺</button>
        </div>
        <div class="bearing-hint">0 = Nord. Clic droit sur la photo → Orienter.</div>
      </div>
      <div class="editor-row editor-actions">
        <button id="btn-edit-photo-file" class="btn-secondary btn-sm">Changer fichier</button>
        <input id="input-edit-photo-file" type="file" accept="image/*" class="hidden" />
        <button id="btn-delete-photo" class="btn-danger btn-sm">Supprimer</button>
      </div>
    </div>
  </aside>

</div>

<!-- ======= MODALS ======= -->

<!-- Site form (create / edit) -->
<div id="modal-site-form" class="modal modal-wide hidden">
  <div class="modal-box">
    <h2 id="modal-site-form-title">Nouveau site</h2>

    <div class="modal-row">
      <label>Nom du site</label>
      <input id="sf-name" type="text" class="input-field" placeholder="Ex: Château de Vincennes" />
    </div>

    <div class="modal-row">
      <label>Adresse</label>
      <input id="sf-address" type="text" class="input-field" placeholder="Adresse du site..." />
    </div>

    <div class="modal-row">
      <label>Icône</label>
      <div id="sf-icon-bank"></div>
    </div>

    <div class="modal-row">
      <label>Image d'illustration</label>
      <div id="sf-illustration-preview"></div>
      <div class="modal-file-row">
        <button id="btn-sf-illustration" class="btn-secondary btn-sm" type="button">Choisir une image</button>
        <button id="btn-sf-clear-illustration" class="btn-icon btn-sm" type="button" title="Supprimer">✕</button>
        <input id="input-sf-illustration" type="file" accept="image/*" class="hidden" />
      </div>
    </div>

    <div class="modal-row">
      <label>Coordonnées GPS</label>
      <div class="modal-coords-row">
        <input id="sf-lat" type="number" class="input-field input-half" placeholder="Latitude" step="any" readonly />
        <input id="sf-lon" type="number" class="input-field input-half" placeholder="Longitude" step="any" readonly />
      </div>
    </div>

    <div class="modal-row">
      <label>Contacts</label>
      <div id="sf-contacts-list"></div>
      <button id="btn-sf-add-contact" class="btn-secondary btn-sm mt-1" type="button">+ Ajouter un contact</button>
    </div>

    <div id="sf-perimeter-row" class="modal-row hidden">
      <button id="btn-sf-redefine-perimeter" class="btn-secondary" type="button">🗺 Redéfinir les limites du site</button>
    </div>

    <div class="modal-actions">
      <button id="btn-sf-confirm" class="btn-primary">Créer le site</button>
      <button id="btn-sf-cancel" class="btn-secondary">Annuler</button>
    </div>
  </div>
</div>

<!-- Building form (create) -->
<div id="modal-add-building" class="modal hidden">
  <div class="modal-box">
    <h2>Ajouter un bâtiment</h2>

    <div class="modal-row">
      <label>Nom du bâtiment</label>
      <input id="bf-name" type="text" class="input-field" placeholder="Ex: Bâtiment principal, Annexe..." />
    </div>

    <div class="modal-row">
      <label>Icône</label>
      <div id="bf-icon-bank"></div>
    </div>

    <div class="modal-actions">
      <button id="btn-bf-confirm" class="btn-primary">Créer le bâtiment</button>
      <button id="btn-bf-cancel" class="btn-secondary">Annuler</button>
    </div>
  </div>
</div>

<!-- Add floor to existing building -->
<div id="modal-add-floor" class="modal hidden">
  <div class="modal-box">
    <h2>Ajouter un niveau</h2>
    <div class="modal-row">
      <label>Nom du niveau</label>
      <input id="new-floor-name" type="text" class="input-field" placeholder="Ex: 1er étage, Sous-sol..." />
    </div>
    <div class="modal-row">
      <label>Plan (image PNG/JPG, optionnel)</label>
      <input id="input-floor-plan" type="file" accept="image/*" class="input-field" />
    </div>
    <div class="modal-actions">
      <button id="btn-create-floor" class="btn-primary">Ajouter</button>
      <button id="btn-cancel-add-floor" class="btn-secondary">Annuler</button>
    </div>
  </div>
</div>

<!-- Add site plan -->
<div id="modal-add-siteplan" class="modal hidden">
  <div class="modal-box">
    <h2>Ajouter un plan de site</h2>
    <div class="modal-row">
      <label>Nom du plan</label>
      <input id="new-siteplan-name" type="text" class="input-field" placeholder="Ex: Plan de masses, Sous-sols..." />
    </div>
    <div class="modal-row">
      <label>Image du plan (PNG/JPG)</label>
      <input id="input-siteplan-file" type="file" accept="image/*" class="input-field" />
    </div>
    <div class="modal-actions">
      <button id="btn-create-siteplan" class="btn-primary">Ajouter</button>
      <button id="btn-cancel-add-siteplan" class="btn-secondary">Annuler</button>
    </div>
  </div>
</div>

<!-- Add photo modal -->
<div id="modal-add-photo" class="modal hidden">
  <div class="modal-box">
    <h2 id="modal-add-photo-title">Ajouter une photo</h2>
    <div class="modal-row">
      <label>Images</label>
      <div id="photo-drop-zone" class="drop-zone">
        <div class="drop-zone-inner">
          <span class="drop-zone-icon">🖼️</span>
          <span class="drop-zone-title">Déposer des images ici</span>
          <span class="drop-zone-sub">PNG, JPG, WEBP — plusieurs fichiers acceptés</span>
          <span class="drop-zone-or">ou</span>
          <button type="button" id="btn-pick-photos" class="btn-secondary btn-sm">Choisir des fichiers</button>
          <input id="input-new-photo-file" type="file" accept="image/*" multiple class="hidden" />
        </div>
        <div id="photo-file-list" class="photo-file-list hidden"></div>
      </div>
    </div>
    <div class="modal-row">
      <label>Titre (si plusieurs fichiers, un numéro est ajouté)</label>
      <input id="new-photo-title" type="text" class="input-field" placeholder="Titre..." />
    </div>
    <div class="modal-row">
      <label>Description</label>
      <textarea id="new-photo-desc" class="input-field" rows="2" placeholder="Description..."></textarea>
    </div>
    <div class="modal-actions">
      <button id="btn-confirm-add-photo" class="btn-primary">Confirmer</button>
      <button id="btn-cancel-add-photo" class="btn-secondary">Annuler</button>
    </div>
  </div>
</div>

<!-- Step prompt modal (perimeter / access arrow) -->
<div id="modal-step-prompt" class="modal hidden">
  <div class="modal-box" style="gap:12px">
    <h2 id="step-prompt-title" style="font-size:16px"></h2>
    <p id="step-prompt-text" style="color:var(--color-text-muted);font-size:13px;line-height:1.5"></p>
    <div class="modal-actions">
      <button id="btn-step-yes" class="btn-primary">Oui</button>
      <button id="btn-step-later" class="btn-secondary">Plus tard</button>
    </div>
  </div>
</div>

<!-- Modal backdrop -->
<div id="modal-backdrop" class="hidden"></div>

<script type="module" src="app.js"></script>
</body>
</html>
